name: assert_h5mu_slots
namespace: "test_workflows"
scope: "test"
description: |
  Test helper. Reads a modality from an output h5mu and asserts that the expected
  .obs columns, .obsm keys, .obsp keys and .uns keys are all present, and that any
  slots listed as absent are not present. Raises an error listing any missing slots
  (expected but absent) or unexpected slots (listed as absent but present).

authors:
  - __merge__: /src/authors/jakub_majercik.yaml
    roles: [ author ]

argument_groups:
  - name: Inputs
    arguments:
      - name: "--input"
        type: file
        description: Output h5mu file to validate.
        required: true
        example: output.h5mu
      - name: "--modality"
        type: string
        description: Modality to inspect.
        default: "rna"
        required: false
  - name: Expected slots
    arguments:
      - name: "--obs"
        type: string
        multiple: true
        description: Expected .obs column names.
        required: false
      - name: "--obsm"
        type: string
        multiple: true
        description: Expected .obsm keys.
        required: false
      - name: "--obsp"
        type: string
        multiple: true
        description: Expected .obsp keys.
        required: false
      - name: "--uns"
        type: string
        multiple: true
        description: Expected .uns keys.
        required: false
  - name: Unexpected slots
    arguments:
      - name: "--obs_absent"
        type: string
        multiple: true
        description: .obs column names that must not be present.
        required: false
      - name: "--obsm_absent"
        type: string
        multiple: true
        description: .obsm keys that must not be present.
        required: false
      - name: "--obsp_absent"
        type: string
        multiple: true
        description: .obsp keys that must not be present.
        required: false
      - name: "--uns_absent"
        type: string
        multiple: true
        description: .uns keys that must not be present.
        required: false

resources:
  - type: python_script
    path: script.py
  - path: /src/utils/setup_logger.py

engines:
  - type: docker
    image: python:3.13-slim
    setup:
      - type: apt
        packages:
          - procps
      - type: python
        __merge__: /src/base/requirements/anndata_mudata.yaml
    __merge__: [/src/base/requirements/python_test_setup.yaml, .]

runners:
  - type: executable
  - type: nextflow
    directives:
      label: [ singlecpu, lowmem ]
