name: parallel_annotation
namespace: single_cell
scope: public
description: |
  Run multiple annotation methods from OpenPipeline in parallel on the same
  preprocessed query h5mu input, then merge each method's predictions
  (predicted labels and probabilities in .obs, and integrated embeddings in
  .obsm for the integration-based methods) back into a single output h5mu.

  These are label-projection (reference-based) methods: they transfer labels from
  a labelled --reference onto the query (CellTypist can alternatively use a
  pretrained --celltypist_model). The reference is expected to be preprocessed in
  the same way as the query.

  Available annotation methods: CellTypist, harmony_knn, scanvi_scarches, scvi_knn, SingleR.

authors:
  - __merge__: /src/authors/jakub_majercik.yaml
    roles: [author, maintainer]

argument_groups:
  - name: Inputs
    arguments:
      - name: "--id"
        type: string
        description: ID of the sample.
        required: true
        example: foo
      - name: "--input"
        type: file
        description: |
          Input query h5mu file. Must be preprocessed in the same way as the
          reference (raw counts and log-normalized counts available).
        required: true
        example: input.h5mu
      - name: "--modality"
        type: string
        description: Which modality to process. Must match the modality in --reference.
        default: "rna"
        required: false
      - name: "--input_layer"
        type: string
        description: |
          The layer of the input query containing raw counts. Required by
          celltypist (which log-normalizes internally), scanvi_scarches and
          scvi_knn (which model raw counts directly).
        required: false
      - name: "--input_layer_lognormalized"
        type: string
        description: |
          The layer of the input query containing log-normalized counts.
          Required by harmony_knn and scvi_knn.
        required: false
      - name: "--input_obs_batch_label"
        type: string
        description: |
          .obs column in the input query containing batch labels. Required by
          harmony_knn, scanvi_scarches and scvi_knn.
        required: false
      - name: "--input_var_gene_names"
        type: string
        description: |
          .var column containing gene names. By default the .var index is used.
        required: false
      - name: "--input_reference_gene_overlap"
        type: integer
        default: 100
        min: 1
        description: Minimum number of genes required to overlap between query and reference.
      - name: "--sanitize_ensembl_ids"
        type: boolean
        default: true
        description: |
          Whether to sanitize ensembl gene ids by removing version numbers. Read by
          celltypist, scanvi_scarches, scvi_knn and singler.
      - name: "--input_obs_categorical_covariates"
        type: string
        multiple: true
        description: |
          .obs column(s) in the input query with categorical covariates for
          scanvi_scarches to correct for in addition to the batch label. Treated as
          nuisance factors; their order must match --reference_obs_categorical_covariates.
          None by default.
        required: false
      - name: "--input_obs_numerical_covariates"
        type: string
        multiple: true
        description: |
          .obs column(s) in the input query with continuous (numerical) covariates for
          scanvi_scarches to correct for in addition to the batch label. Treated as
          nuisance factors; their order must match --reference_obs_numerical_covariates.
          None by default.
        required: false

  - name: Methods
    arguments:
      - name: "--annotation_methods"
        type: string
        description: Annotation methods to run in parallel.
        choices: [celltypist, harmony_knn, scanvi_scarches, scvi_knn, singler]
        multiple: true
        required: true
        example: [celltypist, harmony_knn]

  - name: Reference
    arguments:
      - name: "--reference"
        type: file
        description: |
          Reference h5mu file with labeled observations. Required by harmony_knn,
          scanvi_scarches, scvi_knn, and by celltypist when --celltypist_model
          is not provided.
        required: false
        example: reference.h5mu
      - name: "--reference_layer"
        type: string
        description: Layer of the reference containing raw counts.
        required: false
      - name: "--reference_layer_lognormalized"
        type: string
        description: Layer of the reference containing log-normalized counts.
        required: false
      - name: "--reference_obs_target"
        type: string
        description: .obs column in the reference containing the target cell-type labels.
        required: false
        example: cell_type
      - name: "--reference_obs_batch_label"
        type: string
        description: .obs column in the reference containing batch labels.
        required: false
      - name: "--reference_var_gene_names"
        type: string
        description: .var column in the reference containing gene names. Defaults to the .var index.
        required: false
      - name: "--reference_var_input"
        type: string
        description: |
          .var column in the reference flagging highly-variable genes (boolean).
          Used by celltypist (--reference_var_input) and scanvi_scarches
          (mapped to --reference_var_hvg) to subset features.
        required: false
      - name: "--reference_obs_categorical_covariates"
        type: string
        multiple: true
        description: |
          .obs column(s) in the reference with categorical covariates for
          scanvi_scarches to correct for in addition to the batch label. Treated as
          nuisance factors; their order must match --input_obs_categorical_covariates.
          None by default.
        required: false
      - name: "--reference_obs_numerical_covariates"
        type: string
        multiple: true
        description: |
          .obs column(s) in the reference with continuous (numerical) covariates for
          scanvi_scarches to correct for in addition to the batch label. Treated as
          nuisance factors; their order must match --input_obs_numerical_covariates.
          None by default.
        required: false
      - name: "--reference_obs_label_unlabeled_category"
        type: string
        default: "Unknown"
        description: Value in --reference_obs_target that indicates unlabeled observations.

  - name: Clustering options
    description: Leiden clustering options shared by harmony_knn, scanvi_scarches, scvi_knn.
    arguments:
      - name: "--leiden_resolution"
        type: double
        description: Leiden clustering resolution(s). Higher values lead to more clusters.
        default: [1]
        multiple: true

  - name: Neighbor classifier options
    description: KNN options shared by harmony_knn, scanvi_scarches, scvi_knn.
    arguments:
      - name: "--knn_weights"
        type: string
        choices: [uniform, distance]
        default: "uniform"
        description: Weight function for KNN classifier.
      - name: "--knn_n_neighbors"
        type: integer
        min: 5
        default: 15
        description: Number of neighbors for the KNN classifier.

  - name: scVI / scANVI / scArches training options
    description: |
      Training arguments shared by scanvi_scarches and scvi_knn. (scvi_knn maps
      these to its --scvi_* prefixed arguments at dispatch time.)
    arguments:
      - name: "--scvi_early_stopping"
        type: boolean
        description: Whether to perform early stopping with respect to the validation set.
        required: false
      - name: "--scvi_early_stopping_monitor"
        type: string
        choices: [elbo_validation, reconstruction_loss_validation, kl_local_validation]
        default: "elbo_validation"
        description: Metric logged during validation set epoch.
      - name: "--scvi_early_stopping_patience"
        type: integer
        min: 1
        default: 45
        description: Number of validation epochs with no improvement after which training stops.
      - name: "--scvi_early_stopping_min_delta"
        type: double
        min: 0
        default: 0.0
        description: Minimum change in the monitored metric to qualify as an improvement.
      - name: "--scvi_max_epochs"
        type: integer
        description: Number of training passes through the dataset.
        required: false
      - name: "--scvi_reduce_lr_on_plateau"
        type: boolean
        default: true
        description: Reduce learning rate when validation metric plateaus.
      - name: "--scvi_lr_factor"
        type: double
        min: 0
        default: 0.6
        description: Factor by which to reduce learning rate.
      - name: "--scvi_lr_patience"
        type: double
        min: 0
        default: 30
        description: Number of epochs with no improvement after which lr is reduced.

  - name: CellTypist options
    arguments:
      - name: "--celltypist_model"
        type: file
        description: |
          Pretrained CellTypist model in .pkl format. If not provided, the
          model is trained on --reference.
        required: false
        example: pretrained_model.pkl
      - name: "--celltypist_majority_voting"
        type: boolean
        default: false
        description: Refine predicted labels by majority voting after over-clustering.
      - name: "--celltypist_feature_selection"
        type: boolean
        default: false
        description: Whether to perform feature selection during training.
      - name: "--celltypist_C"
        type: double
        default: 1.0
        description: Inverse of regularization strength in logistic regression.
      - name: "--celltypist_max_iter"
        type: integer
        default: 1000
        description: Maximum iterations before reaching the cost-function minimum.
      - name: "--celltypist_use_SGD"
        type: boolean
        default: false
        description: Whether to use stochastic gradient descent.
      - name: "--celltypist_min_prop"
        type: double
        default: 0
        description: |
          Minimum proportion of cells in a sub-cluster supporting a label for
          majority voting; only relevant if --celltypist_majority_voting is set.

  - name: harmony_knn options
    arguments:
      - name: "--harmony_knn_n_hvg"
        type: integer
        default: 2000
        description: Number of highly-variable genes to keep for harmony_knn.
      - name: "--harmony_knn_pca_num_components"
        type: integer
        description: Number of principal components to compute for harmony_knn.
        required: false
      - name: "--harmony_knn_theta"
        type: double
        description: Diversity clustering penalty for harmony.
        default: [2]
        multiple: true

  - name: scvi_knn options
    arguments:
      - name: "--scvi_knn_n_hvg"
        type: integer
        default: 2000
        description: Number of highly-variable genes to keep for scvi_knn.

  - name: SingleR options
    arguments:
      - name: "--singler_input_obs_clusters"
        type: string
        required: false
        description: |
          .obs column with cluster identities. If provided, SingleR annotates the
          aggregated cluster profiles; otherwise it annotates per observation.
      - name: "--singler_de_method"
        type: string
        choices: [classic, t, wilcox]
        default: "classic"
        description: Method to detect differentially expressed genes between pairs of labels.
      - name: "--singler_de_n_genes"
        type: integer
        min: 1
        required: false
        description: |
          Number of differentially expressed genes per label pair to use as markers.
          Defaults to a SingleR heuristic based on the number of labels.
      - name: "--singler_quantile"
        type: double
        min: 0
        max: 1
        default: 0.8
        description: Quantile of the correlation distribution used to score each label.
      - name: "--singler_fine_tune"
        type: boolean
        default: true
        description: Whether to fine-tune label assignment after the initial classification.
      - name: "--singler_fine_tuning_threshold"
        type: double
        default: 0.05
        description: Maximum difference from the maximum correlation to use in fine-tuning.
      - name: "--singler_prune"
        type: boolean
        default: true
        description: |
          Whether to prune low-quality labels (replaced with NA in the pruned
          predictions output).

  - name: Output slot naming
    description: |
      Names of the .obs and .obsm slots each method writes into its
      intermediate h5mu and that are subsequently moved into the merged output.
    arguments:
      - name: "--celltypist_obs_predictions"
        type: string
        default: "celltypist_pred"
      - name: "--celltypist_obs_probability"
        type: string
        default: "celltypist_probability"

      - name: "--harmony_knn_obs_predictions"
        type: string
        default: "harmony_knn_pred"
      - name: "--harmony_knn_obs_probability"
        type: string
        default: "harmony_knn_probability"
      - name: "--harmony_knn_obsm_integrated"
        type: string
        default: "X_integrated_harmony"

      - name: "--scanvi_scarches_obs_predictions"
        type: string
        default: "scanvi_pred"
      - name: "--scanvi_scarches_obs_probability"
        type: string
        default: "scanvi_probability"
      - name: "--scanvi_scarches_obsm_integrated"
        type: string
        default: "X_integrated_scanvi"

      - name: "--scvi_knn_obs_predictions"
        type: string
        default: "scvi_knn_pred"
      - name: "--scvi_knn_obs_probability"
        type: string
        default: "scvi_knn_probability"
      - name: "--scvi_knn_obsm_integrated"
        type: string
        default: "X_integrated_scvi"

      - name: "--singler_obs_predictions"
        type: string
        default: "singler_pred"
      - name: "--singler_obs_probability"
        type: string
        default: "singler_probability"
      - name: "--singler_obs_delta_next"
        type: string
        default: "singler_delta_next"
      - name: "--singler_obs_pruned_predictions"
        type: string
        default: "singler_pruned_labels"
      - name: "--singler_obsm_scores"
        type: string
        default: "singler_scores"

  - name: Output
    arguments:
      - name: "--output"
        alternatives: [-o]
        type: file
        description: |
          Output h5mu file — the input query with each selected method's
          predictions and embeddings merged into the target modality.
        direction: output
        required: true
        example: output.h5mu
      - name: "--output_compression"
        type: string
        choices: [gzip, lzf]
        required: false
        example: gzip
        description: Compression format for the output h5mu file.
      - name: "--output_scanvi_model"
        type: file
        description: |
          Output folder with the trained scANVI/scArches model. Only produced when
          scanvi_scarches is among the selected --annotation_methods.
        direction: output
        required: false
        example: scanvi_model/

dependencies:
  - name: workflows/annotation/celltypist
    repository: openpipeline
    alias: celltypist_annotation
  - name: workflows/annotation/harmony_knn
    repository: openpipeline
    alias: harmony_knn_annotation
  - name: workflows/annotation/scanvi_scarches
    repository: openpipeline
    alias: scanvi_scarches_annotation
  - name: workflows/annotation/scvi_knn
    repository: openpipeline
    alias: scvi_knn_annotation
  - name: annotate/singler
    repository: openpipeline
    alias: singler_annotation
  - name: dataflow/move_anndata_slots
    alias: move_slots

resources:
  - type: nextflow_script
    path: main.nf
    entrypoint: run_wf

test_resources:
  - type: nextflow_script
    path: test.nf
    entrypoint: test_wf
  - path: /resources_test/pbmc_1k_protein_v3/pbmc_1k_protein_v3_mms.h5mu
  - path: /resources_test/annotation_test_data/TS_Blood_filtered.h5mu
  - path: /resources_test/annotation_test_data/celltypist_model_Immune_All_Low.pkl

runners:
  - type: nextflow
