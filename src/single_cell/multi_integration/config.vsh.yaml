name: multi_integration
namespace: single_cell
scope: public
description: |
  Run multiple integration methods from OpenPipeline in parallel on the same
  preprocessed h5mu input, then merge each method's annotations (leiden cluster
  labels in .obs, integrated embeddings and UMAPs in .obsm, neighbor graphs in
  .obsp and .uns) back into a single output h5mu.

  Available integration methods: Harmony, scVI, Scanorama, BBKNN.

authors:
  - __merge__: /src/authors/jakub_majercik.yaml
    roles: [author, maintainer]

argument_groups:
  - name: Inputs
    arguments:
      - name: "--id"
        type: string
        description: ID of the sample.
        required: true
        example: foo
      - name: "--input"
        type: file
        description: |
          Input preprocessed h5mu file. Must contain a log-normalized layer and
          a PCA embedding (or the embedding specified via --obsm_embedding).
        required: true
        example: input.h5mu
      - name: "--modality"
        type: string
        description: Which modality to process.
        default: "rna"
        required: false
      - name: "--layer"
        type: string
        description: Layer in the modality containing log-normalized counts.
        default: "log_normalized"
        required: false
      - name: "--obsm_embedding"
        type: string
        description: |
          .obsm slot containing the embedding to use as input for methods that
          require a pre-computed dimensionality reduction (harmony, scanorama, bbknn).
        default: "X_pca"
        required: false

  - name: Methods
    arguments:
      - name: "--integration_methods"
        type: string
        description: Integration methods to run in parallel.
        choices: [harmony, scvi, scanorama, bbknn]
        multiple: true
        required: true
        example: [harmony, scvi]

  - name: Clustering options
    arguments:
      - name: "--leiden_resolution"
        type: double
        description: |
          Leiden clustering resolution(s). Each method will produce one .obs
          cluster column per resolution, named "{method}_integration_leiden_{resolution}".
        default: [1]
        multiple: true

  - name: Harmony options
    arguments:
      - name: "--harmony_obs_covariates"
        type: string
        description: ".obs column(s) defining the covariates to regress out."
        multiple: true
        default: ["sample_id"]
        required: false
      - name: "--harmony_theta"
        type: double
        description: |
          Diversity clustering penalty. Higher values produce more diverse clusters.
        default: 2
        multiple: true

  - name: scVI options
    arguments:
      - name: "--scvi_obs_batch"
        type: string
        description: ".obs column discriminating between batches for scVI."
        default: "sample_id"
        required: false
      - name: "--scvi_var_input"
        type: string
        description: |
          .var column containing highly variable genes to subset to. By default,
          scVI uses all genes.
        required: false
      - name: "--early_stopping"
        type: boolean
        description: Whether scVI should perform early stopping on the validation set.
        required: false
      - name: "--early_stopping_monitor"
        type: string
        choices: [elbo_validation, reconstruction_loss_validation, kl_local_validation]
        default: elbo_validation
        description: Metric logged during validation set epoch.
      - name: "--early_stopping_patience"
        type: integer
        min: 1
        default: 45
        description: Number of validation epochs with no improvement after which training stops.
      - name: "--early_stopping_min_delta"
        type: double
        min: 0
        default: 0.0
        description: Minimum change in the monitored metric to qualify as improvement.
      - name: "--max_epochs"
        type: integer
        description: Number of training passes through the dataset.
        required: false
      - name: "--reduce_lr_on_plateau"
        type: boolean
        description: Reduce learning rate when validation metric plateaus.
        default: true
      - name: "--lr_factor"
        type: double
        min: 0
        default: 0.6
        description: Factor by which to reduce learning rate.
      - name: "--lr_patience"
        type: double
        min: 0
        default: 30
        description: Number of epochs with no improvement after which lr is reduced.

  - name: Scanorama options
    arguments:
      - name: "--scanorama_obs_batch"
        type: string
        description: ".obs column discriminating between batches for Scanorama."
        default: "sample_id"
        required: false
      - name: "--scanorama_knn"
        type: integer
        description: Number of nearest neighbors used for matching.
        default: 20
      - name: "--scanorama_batch_size"
        type: integer
        description: Batch size used in the alignment vector computation.
        default: 5000
      - name: "--scanorama_sigma"
        type: double
        description: Correction smoothing parameter on the Gaussian kernel.
        default: 15
      - name: "--scanorama_approx"
        type: boolean
        description: Use approximate nearest neighbors (annoy).
        default: true
      - name: "--scanorama_alpha"
        type: double
        description: Alignment score minimum cutoff.
        default: 0.1

  - name: BBKNN options
    arguments:
      - name: "--bbknn_obs_batch"
        type: string
        description: ".obs column discriminating between batches for BBKNN."
        default: "sample_id"
        required: false
      - name: "--bbknn_n_neighbors_within_batch"
        type: integer
        description: Top neighbours to report for each batch.
        default: 3
      - name: "--bbknn_n_pcs"
        type: integer
        description: Number of dimensions to use from the input embedding.
        default: 50
      - name: "--bbknn_n_trim"
        type: integer
        description: |
          Trim each cell's neighbours to these many top connectivities. Set to 0
          to skip; leave unset to use the BBKNN default (10 * n_neighbors_within_batch
          * n_batches).
        required: false

  - name: Output
    arguments:
      - name: "--output"
        alternatives: [-o]
        type: file
        description: |
          Output h5mu file — the input preprocessed file with each selected
          method's annotations merged into the target modality.
        direction: output
        required: true
        example: output.h5mu
      - name: "--output_compression"
        type: string
        description: Compression format for the output h5mu file.
        choices: [gzip, lzf]
        required: false
        example: gzip

dependencies:
  - name: workflows/integration/harmony_leiden
    repository: openpipeline
    alias: harmony_integration
  - name: workflows/integration/scvi_leiden
    repository: openpipeline
    alias: scvi_integration
  - name: workflows/integration/scanorama_leiden
    repository: openpipeline
    alias: scanorama_integration
  - name: workflows/integration/bbknn_leiden
    repository: openpipeline
    alias: bbknn_integration
  - name: dataflow/move_anndata_slots
    alias: move_slots

resources:
  - type: nextflow_script
    path: main.nf
    entrypoint: run_wf

test_resources:
  - type: nextflow_script
    path: test.nf
    entrypoint: test_wf
  - path: /resources_test/pbmc_1k_protein_v3/pbmc_1k_protein_v3_mms.h5mu

runners:
  - type: nextflow
