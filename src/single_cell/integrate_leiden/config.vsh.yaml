name: "integrate_leiden"
namespace: "single_cell"
scope: private
description: |
  A pipeline for the integration of single cell (multi-)omics data, 
  with the ability for correcting for technical variation using various methods in parallel. Available integration methods:
  - Harmony
  - scVI

authors:
  - __merge__: /src/authors/dorien_roosen.yaml
    roles: [ author, maintainer ]
  - __merge__: /src/authors/weiwei_schultz.yaml
    roles: [ contributor ]

argument_groups:
  - name: Input (query) data arguments
    description: The input query dataset(s) to be annotated
    arguments:
      - name: "--id"
        required: true
        type: string
        description: ID of the sample.
        example: foo
      - name: "--input"
        required: true
        type: file
        description: Input query dataset(s) to be annotated
        example: input.h5mu
      - name: "--modality"
        default: "rna"
        type: string
        description: Modality to be processed. Should match the modality in the --reference dataset, if provided.
      - name: "--layer"
        type: string
        description: "The layer in the input data containing the raw counts, if .X is not to be used."
        required: false
      - name: "--layer_lognormalized"
        type: string
        description: |
          The layer in the input data containing the log-normalized counts.
          Required for `--integration_methods harmony`.
        default: "log_normalized"
      - name: "--obs_batch"
        type: string
        description: |
          The name of the .obs field containing batch labels to be used for integration.
          Required for `--integration_methods scvi`.
      - name: "--var_input"
        type: string
        required: false
        description: |
          The .var field containing the boolean mask that will be used to select features (e.g. based on highly variable genes) for scVI model training.
          By default, features are not subset and all features are used for training.
        example: filter_with_hvg
      - name: "--var_gene_names"
        type: string
        required: false
        description: |
          The name of the adata var column containing gene names; when no gene_name_layer is provided, the var index will be used.
      - name: "--obsm_embedding"
        type: string
        default: "X_pca"
        required: false
        description: |
          The name of the adata.obsm field containing the dimensionality reduction embedding to be used for integration and clustering.
          Required for `--integration_methods harmony`.
      - name: "--integration_methods"
        type: string
        multiple: true
        required: true
        choices: [harmony, scvi]
        example: harmony;scvi
        description: Integration methods to be executed.

  - name: Harmony integration options
    description: Specifications for harmony integration.
    arguments:
      - name: "--harmony_theta"
        type: double
        description: |
          Diversity clustering penalty parameter. Specify for each variable in group.by.vars. 
          theta=0 does not encourage any diversity. Larger values of theta
          result in more diverse clusters."
        default: 2
        example: [0, 1, 2]
        multiple: true
      - name: "--harmony_obs_covariates"
        type: string
        description: "The .obs field(s) that define the covariate(s) to regress out."
        example: ["batch", "sample"]
        required: true
        multiple: true
        default: "sample_id"

  - name: scVI integration options
    description: Training arguments for scVI models.
    arguments:
      - name: "--early_stopping"
        required: false
        type: boolean
        description: "Whether to perform early stopping with respect to the validation set."
      - name: "--early_stopping_monitor"
        choices: ["elbo_validation", "reconstruction_loss_validation", "kl_local_validation"]
        default: "elbo_validation"
        type: string
        description: "Metric logged during validation set epoch."
      - name: "--early_stopping_patience"
        type: integer
        min: 1
        default: 45
        description: "Number of validation epochs with no improvement after which training will be stopped."
      - name: "--early_stopping_min_delta"
        min: 0
        type: double
        default: 0.0
        description: "Minimum change in the monitored quantity to qualify as an improvement, i.e. an absolute change of less than min_delta, will count as no improvement."
      - name: "--max_epochs"
        type: integer
        description: "Number of passes through the dataset, defaults to (20000 / number of cells) * 400 or 400; whichever is smallest."
        required: false
      - name: "--reduce_lr_on_plateau"
        description: "Whether to monitor validation loss and reduce learning rate when validation set `lr_scheduler_metric` plateaus."
        type: boolean
        default: True
      - name: "--lr_factor"
        description: "Factor to reduce learning rate."
        type: double
        default: 0.6
        min: 0
      - name: "--lr_patience"
        description: "Number of epochs with no improvement after which learning rate will be reduced."
        type: double
        default: 30
        min: 0

  - name: Clustering options
    description: Arguments for Leiden clustering. Only relevant for --annotation_methods `scvi_knn`, `scanvi_scarches` and `harmony_knn`.
    arguments:
      - name: "--leiden_resolution"
        type: double
        description: Control the coarseness of the clustering. Higher values lead to more clusters.
        default: [1]
        multiple: true

  - name: Neighbor classifier arguments
    description: Arguments related to calculating the n nearest neighbors. Only relevant for --annotation_methods `scvi_knn`, `scanvi_scarches` and `harmony_knn`.
    arguments:
      - name: "--knn_weights"
        type: string
        default: "uniform"
        choices: ["uniform", "distance"]
        description: |
          Weight function used in prediction. Possible values are:
          `uniform` (all points in each neighborhood are weighted equally) or 
          `distance` (weight points by the inverse of their distance)
      - name: "--knn_n_neighbors"
        type: integer
        default: 15
        min: 5
        required: false
        description: |
          The number of neighbors to use in k-neighbor graph structure used for fast approximate nearest neighbor search with PyNNDescent. 
          Larger values will result in more accurate search results at the cost of computation time.

  - name: Outputs
    description: The output file to write the annotated dataset to.
    arguments:
    - name: "--output"
      type: file
      direction: output
      required: true
      description: |
        The output file.
      example: output.h5mu
    - name: "--output_scvi_model"
      type: file
      direction: output
      example: "scvi_model"
      required: false
      description: |
        Output directory to which the trained scVI model will be written. 
  
  - name: Harmony output slots
    description: The output .obs, .obsp and .obsm fields where Harmony results will be written to.
    arguments:
      - name: "--harmony_obsm_integrated"
        type: string
        default: "X_harmony_integrated"
        description: The name of the .obsm field where the Harmony embedding will be written to.
      - name: "--harmony_uns_neighbors"
        type: string
        default: "harmony_integration_neighbors"
        description: The name of the .uns field where the Harmony neighbors will be written to.
      - name: "--harmony_obsp_neighbor_distances"
        type: string
        default: "harmony_integration_neighbor_distances"
        description: The name of the .obsp field where the Harmony neighbor distances will be written to.
      - name: "--harmony_obsp_neighbor_connectivities"
        type: string
        default: "harmony_integration_neighbor_connectivities"
        description: The name of the .obsp field where the Harmony neighbor connectivities will be written to.
      - name: "--harmony_obs_cluster"
        type: string
        default: "harmony_integration_leiden_clusters"
        description: The name of the .obs field where the Harmony Leiden cluster labels will be written to.
      - name: "--harmony_obsm_umap"
        type: string
        default: "X_harmony_umap"
        description: The name of the .obsm field where the Harmony UMAP embedding will be written to.

  - name: scVI output slots
    description: The output .obs, .obsp and .obsm fields where scVI results will be written to.
    arguments:
      - name: "--scvi_obsm_integrated"
        type: string
        default: "X_scvi_integrated"
        description: The name of the .obsm field where the scVI embedding will be written to.
      - name: "--scvi_uns_neighbors"
        type: string
        default: "scvi_integration_neighbors"
        description: The name of the .uns field where the scVI neighbors will be written to.
      - name: "--scvi_obsp_neighbor_distances"
        type: string
        default: "scvi_integration_neighbor_distances"
        description: The name of the .obsp field where the scVI neighbor distances will be written to.
      - name: "--scvi_obsp_neighbor_connectivities"
        type: string
        default: "scvi_integration_neighbor_connectivities"
        description: The name of the .obsp field where the scVI neighbor connectivities will be written to.
      - name: "--scvi_obs_cluster"
        type: string
        default: "scvi_integration_leiden_clusters"
        description: The name of the .obs field where the scVI Leiden cluster labels will be written to.
      - name: "--scvi_obsm_umap"
        type: string
        default: "X_scvi_umap"
        description: The name of the .obsm field where the Harmony UMAP embedding will be written to.

dependencies:
  - name: workflows/integration/harmony_leiden
    repository: openpipeline
    alias: harmony_integration
  - name: workflows/integration/scvi_leiden
    repository: openpipeline
    alias: scvi_integration

resources:
  - type: nextflow_script
    path: main.nf
    entrypoint: run_wf

test_resources:
  - type: nextflow_script
    path: test.nf
    entrypoint: test_wf
  - path: /resources_test/pbmc_1k_protein_v3/pbmc_1k_protein_v3_mms.h5mu

runners:
  - type: nextflow