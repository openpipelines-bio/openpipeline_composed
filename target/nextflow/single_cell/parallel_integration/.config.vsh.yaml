name: "parallel_integration"
namespace: "single_cell"
version: "build_main"
authors:
- name: "Jakub Majercik"
  roles:
  - "author"
  - "maintainer"
  info:
    role: "Contributor"
    links:
      email: "jakub@data-intuitive.com"
      github: "jakubmajercik"
      linkedin: "jakubmajercik"
    organizations:
    - name: "Data Intuitive"
      href: "https://www.data-intuitive.com"
      role: "Bioinformatics Engineer"
argument_groups:
- name: "Inputs"
  arguments:
  - type: "string"
    name: "--id"
    description: "ID of the sample."
    info: null
    example:
    - "foo"
    required: true
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "file"
    name: "--input"
    description: "Input preprocessed h5mu file. Must contain a log-normalized layer\
      \ and\na PCA embedding (or the embedding specified via --obsm_embedding).\n"
    info: null
    example:
    - "input.h5mu"
    must_exist: true
    create_parent: true
    required: true
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "string"
    name: "--modality"
    description: "Which modality to process."
    info: null
    default:
    - "rna"
    required: false
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "string"
    name: "--layer_log_normalized_counts"
    description: "Layer with the log-normalized counts. Read by the methods that operate\n\
      on normalized expression: harmony, scanorama and bbknn.\n"
    info: null
    default:
    - "log_normalized"
    required: false
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "string"
    name: "--layer_raw_counts"
    description: "Layer with the raw (integer) counts. Read by scVI, which requires\
      \ raw\ncounts rather than log-normalized data. If left unset, scVI reads the\n\
      counts from the modality's .X.\n"
    info: null
    required: false
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "string"
    name: "--obsm_embedding"
    description: ".obsm slot containing the embedding to use as input for methods\
      \ that\nrequire a pre-computed dimensionality reduction (harmony, scanorama,\
      \ bbknn).\n"
    info: null
    default:
    - "X_pca"
    required: false
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "string"
    name: "--obs_batch"
    description: ".obs column discriminating between batches. Read by scVI, scanorama\
      \ and bbknn.\n"
    info: null
    default:
    - "sample_id"
    required: false
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "string"
    name: "--obs_covariates"
    description: ".obs column(s) defining the covariates to regress out. Read by harmony.\n"
    info: null
    default:
    - "sample_id"
    required: false
    direction: "input"
    multiple: true
    multiple_sep: ";"
  - type: "string"
    name: "--obs_categorical_covariates"
    description: ".obs column(s) with categorical covariates for scVI to correct for\
      \ in\naddition to --obs_batch. Treated as nuisance factors, so do not use them\n\
      for biological signal you want to keep. None by default.\n"
    info: null
    required: false
    direction: "input"
    multiple: true
    multiple_sep: ";"
  - type: "string"
    name: "--obs_numerical_covariates"
    description: ".obs column(s) with continuous (numerical) covariates for scVI to\
      \ correct\nfor in addition to --obs_batch. Treated as nuisance factors, so do\
      \ not use\nthem for biological signal you want to keep. None by default.\n"
    info: null
    required: false
    direction: "input"
    multiple: true
    multiple_sep: ";"
  - type: "string"
    name: "--var_input"
    description: ".var column containing highly variable genes to subset to. Read\
      \ by scVI.\nBy default, scVI uses all genes.\n"
    info: null
    required: false
    direction: "input"
    multiple: false
    multiple_sep: ";"
- name: "Methods"
  arguments:
  - type: "string"
    name: "--integration_methods"
    description: "Integration methods to run in parallel."
    info: null
    example:
    - "harmony"
    - "scvi"
    required: true
    choices:
    - "harmony"
    - "scvi"
    - "scanorama"
    - "bbknn"
    direction: "input"
    multiple: true
    multiple_sep: ";"
- name: "Clustering options"
  arguments:
  - type: "double"
    name: "--leiden_resolution"
    description: "Leiden clustering resolution(s). Each method will produce one .obs\n\
      cluster column per resolution, named \"{method}_integration_leiden_{resolution}\"\
      .\n"
    info: null
    default:
    - 1.0
    required: false
    direction: "input"
    multiple: true
    multiple_sep: ";"
- name: "Harmony options"
  arguments:
  - type: "double"
    name: "--harmony_theta"
    description: "Diversity clustering penalty. Higher values produce more diverse\
      \ clusters.\n"
    info: null
    default:
    - 2.0
    required: false
    direction: "input"
    multiple: true
    multiple_sep: ";"
- name: "scVI options"
  arguments:
  - type: "boolean"
    name: "--scvi_early_stopping"
    description: "Whether scVI should perform early stopping on the validation set."
    info: null
    required: false
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "string"
    name: "--scvi_early_stopping_monitor"
    description: "Metric logged during validation set epoch."
    info: null
    default:
    - "elbo_validation"
    required: false
    choices:
    - "elbo_validation"
    - "reconstruction_loss_validation"
    - "kl_local_validation"
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "integer"
    name: "--scvi_early_stopping_patience"
    description: "Number of validation epochs with no improvement after which training\
      \ stops."
    info: null
    default:
    - 45
    required: false
    min: 1
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "double"
    name: "--scvi_early_stopping_min_delta"
    description: "Minimum change in the monitored metric to qualify as improvement."
    info: null
    default:
    - 0.0
    required: false
    min: 0.0
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "integer"
    name: "--scvi_max_epochs"
    description: "Number of training passes through the dataset."
    info: null
    required: false
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "boolean"
    name: "--scvi_reduce_lr_on_plateau"
    description: "Reduce learning rate when validation metric plateaus."
    info: null
    default:
    - true
    required: false
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "double"
    name: "--scvi_lr_factor"
    description: "Factor by which to reduce learning rate."
    info: null
    default:
    - 0.6
    required: false
    min: 0.0
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "double"
    name: "--scvi_lr_patience"
    description: "Number of epochs with no improvement after which lr is reduced."
    info: null
    default:
    - 30.0
    required: false
    min: 0.0
    direction: "input"
    multiple: false
    multiple_sep: ";"
- name: "Scanorama options"
  arguments:
  - type: "integer"
    name: "--scanorama_knn"
    description: "Number of nearest neighbors used for matching."
    info: null
    default:
    - 20
    required: false
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "integer"
    name: "--scanorama_batch_size"
    description: "Batch size used in the alignment vector computation."
    info: null
    default:
    - 5000
    required: false
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "double"
    name: "--scanorama_sigma"
    description: "Correction smoothing parameter on the Gaussian kernel."
    info: null
    default:
    - 15.0
    required: false
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "boolean"
    name: "--scanorama_approx"
    description: "Use approximate nearest neighbors (annoy)."
    info: null
    default:
    - true
    required: false
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "double"
    name: "--scanorama_alpha"
    description: "Alignment score minimum cutoff."
    info: null
    default:
    - 0.1
    required: false
    direction: "input"
    multiple: false
    multiple_sep: ";"
- name: "BBKNN options"
  arguments:
  - type: "integer"
    name: "--bbknn_n_neighbors_within_batch"
    description: "Top neighbours to report for each batch."
    info: null
    default:
    - 3
    required: false
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "integer"
    name: "--bbknn_n_pcs"
    description: "Number of dimensions to use from the input embedding."
    info: null
    default:
    - 50
    required: false
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "integer"
    name: "--bbknn_n_trim"
    description: "Trim each cell's neighbours to these many top connectivities. Set\
      \ to 0\nto skip; leave unset to use the BBKNN default (10 * n_neighbors_within_batch\n\
      * n_batches).\n"
    info: null
    required: false
    direction: "input"
    multiple: false
    multiple_sep: ";"
- name: "Output slot naming"
  description: "Names of the slots each method writes into its intermediate h5mu and\n\
    that are subsequently moved into the merged output. The per-resolution\nleiden\
    \ columns are named \"{obs_cluster}_{resolution}\" (e.g.\n\"harmony_integration_leiden_1.0\"\
    ).\n"
  arguments:
  - type: "string"
    name: "--harmony_obsm_integrated"
    description: ".obsm slot for the harmony-integrated embedding."
    info: null
    default:
    - "X_harmony_integrated"
    required: false
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "string"
    name: "--harmony_obsm_umap"
    description: ".obsm slot for the harmony UMAP embedding."
    info: null
    default:
    - "X_harmony_umap"
    required: false
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "string"
    name: "--harmony_obs_cluster"
    description: ".obs prefix for the harmony leiden cluster columns."
    info: null
    default:
    - "harmony_integration_leiden"
    required: false
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "string"
    name: "--harmony_uns_neighbors"
    description: ".uns slot for harmony neighbor graph metadata."
    info: null
    default:
    - "harmony_integration_neighbors"
    required: false
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "string"
    name: "--harmony_obsp_neighbor_distances"
    description: ".obsp slot for harmony neighbor distances."
    info: null
    default:
    - "harmony_integration_neighbor_distances"
    required: false
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "string"
    name: "--harmony_obsp_neighbor_connectivities"
    description: ".obsp slot for harmony neighbor connectivities."
    info: null
    default:
    - "harmony_integration_neighbor_connectivities"
    required: false
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "string"
    name: "--scvi_obsm_integrated"
    description: ".obsm slot for the scVI-integrated latent embedding."
    info: null
    default:
    - "X_scvi_integrated"
    required: false
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "string"
    name: "--scvi_obsm_umap"
    description: ".obsm slot for the scVI UMAP embedding."
    info: null
    default:
    - "X_scvi_umap"
    required: false
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "string"
    name: "--scvi_obs_cluster"
    description: ".obs prefix for the scVI leiden cluster columns."
    info: null
    default:
    - "scvi_integration_leiden"
    required: false
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "string"
    name: "--scvi_uns_neighbors"
    description: ".uns slot for scVI neighbor graph metadata."
    info: null
    default:
    - "scvi_integration_neighbors"
    required: false
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "string"
    name: "--scvi_obsp_neighbor_distances"
    description: ".obsp slot for scVI neighbor distances."
    info: null
    default:
    - "scvi_integration_neighbor_distances"
    required: false
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "string"
    name: "--scvi_obsp_neighbor_connectivities"
    description: ".obsp slot for scVI neighbor connectivities."
    info: null
    default:
    - "scvi_integration_neighbor_connectivities"
    required: false
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "string"
    name: "--scanorama_obsm_integrated"
    description: ".obsm slot for the scanorama-integrated embedding."
    info: null
    default:
    - "X_scanorama_integrated"
    required: false
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "string"
    name: "--scanorama_obsm_umap"
    description: ".obsm slot for the scanorama UMAP embedding."
    info: null
    default:
    - "X_scanorama_umap"
    required: false
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "string"
    name: "--scanorama_obs_cluster"
    description: ".obs prefix for the scanorama leiden cluster columns."
    info: null
    default:
    - "scanorama_integration_leiden"
    required: false
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "string"
    name: "--scanorama_uns_neighbors"
    description: ".uns slot for scanorama neighbor graph metadata."
    info: null
    default:
    - "scanorama_integration_neighbors"
    required: false
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "string"
    name: "--scanorama_obsp_neighbor_distances"
    description: ".obsp slot for scanorama neighbor distances."
    info: null
    default:
    - "scanorama_integration_neighbor_distances"
    required: false
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "string"
    name: "--scanorama_obsp_neighbor_connectivities"
    description: ".obsp slot for scanorama neighbor connectivities."
    info: null
    default:
    - "scanorama_integration_neighbor_connectivities"
    required: false
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "string"
    name: "--bbknn_obsm_umap"
    description: ".obsm slot for the BBKNN UMAP embedding."
    info: null
    default:
    - "X_bbknn_umap"
    required: false
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "string"
    name: "--bbknn_obs_cluster"
    description: ".obs prefix for the BBKNN leiden cluster columns."
    info: null
    default:
    - "bbknn_integration_leiden"
    required: false
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "string"
    name: "--bbknn_uns_neighbors"
    description: ".uns slot for BBKNN neighbor graph metadata."
    info: null
    default:
    - "bbknn_integration_neighbors"
    required: false
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "string"
    name: "--bbknn_obsp_neighbor_distances"
    description: ".obsp slot for BBKNN neighbor distances."
    info: null
    default:
    - "bbknn_integration_neighbor_distances"
    required: false
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "string"
    name: "--bbknn_obsp_neighbor_connectivities"
    description: ".obsp slot for BBKNN neighbor connectivities."
    info: null
    default:
    - "bbknn_integration_neighbor_connectivities"
    required: false
    direction: "input"
    multiple: false
    multiple_sep: ";"
- name: "Output"
  arguments:
  - type: "file"
    name: "--output"
    alternatives:
    - "-o"
    description: "Output h5mu file — the input preprocessed file with each selected\n\
      method's annotations merged into the target modality.\n"
    info: null
    example:
    - "output.h5mu"
    must_exist: true
    create_parent: true
    required: true
    direction: "output"
    multiple: false
    multiple_sep: ";"
  - type: "string"
    name: "--output_compression"
    description: "Compression format for the output h5mu file."
    info: null
    example:
    - "gzip"
    required: false
    choices:
    - "gzip"
    - "lzf"
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "file"
    name: "--output_scvi_model"
    description: "Output folder with the trained scVI model. Only produced when scVI\
      \ is\namong the selected --integration_methods.\n"
    info: null
    example:
    - "scvi_model"
    must_exist: true
    create_parent: true
    required: false
    direction: "output"
    multiple: false
    multiple_sep: ";"
resources:
- type: "nextflow_script"
  path: "main.nf"
  is_executable: true
  entrypoint: "run_wf"
- type: "file"
  path: "nextflow_labels.config"
  dest: "nextflow_labels.config"
description: "Run multiple integration methods from OpenPipeline in parallel on the\
  \ same\npreprocessed h5mu input, then merge each method's annotations (leiden cluster\n\
  labels in .obs, integrated embeddings and UMAPs in .obsm, neighbor graphs in\n.obsp\
  \ and .uns) back into a single output h5mu.\n\nAvailable integration methods: Harmony,\
  \ scVI, Scanorama, BBKNN.\n"
test_resources:
- type: "nextflow_script"
  path: "test.nf"
  is_executable: true
  entrypoint: "test_wf"
- type: "file"
  path: "pbmc_1k_protein_v3_mms.h5mu"
info: null
status: "enabled"
scope:
  image: "public"
  target: "public"
requirements:
  commands:
  - "ps"
dependencies:
- name: "workflows/integration/harmony_leiden"
  alias: "harmony_integration"
  repository:
    type: "vsh"
    repo: "openpipeline"
    tag: "v4.1.0"
- name: "workflows/integration/scvi_leiden"
  alias: "scvi_integration"
  repository:
    type: "vsh"
    repo: "openpipeline"
    tag: "v4.1.0"
- name: "workflows/integration/scanorama_leiden"
  alias: "scanorama_integration"
  repository:
    type: "vsh"
    repo: "openpipeline"
    tag: "v4.1.0"
- name: "workflows/integration/bbknn_leiden"
  alias: "bbknn_integration"
  repository:
    type: "vsh"
    repo: "openpipeline"
    tag: "v4.1.0"
- name: "dataflow/move_anndata_slots"
  alias: "move_slots"
  repository:
    type: "local"
repositories:
- type: "vsh"
  name: "openpipeline"
  repo: "openpipeline"
  tag: "v4.1.0"
- type: "vsh"
  name: "openpipeline_qc"
  repo: "openpipeline_qc"
  tag: "v0.3.0"
- type: "vsh"
  name: "biobox"
  repo: "biobox"
  tag: "v0.4.2"
links:
  repository: "https://github.com/openpipelines-bio/openpipeline_composed"
  docker_registry: "ghcr.io"
runners:
- type: "nextflow"
  id: "nextflow"
  directives:
    tag: "$id"
  auto:
    simplifyInput: true
    simplifyOutput: false
    transcript: false
    publish: false
  config:
    labels:
      mem1gb: "memory = 1000000000.B"
      mem2gb: "memory = 2000000000.B"
      mem5gb: "memory = 5000000000.B"
      mem10gb: "memory = 10000000000.B"
      mem20gb: "memory = 20000000000.B"
      mem50gb: "memory = 50000000000.B"
      mem100gb: "memory = 100000000000.B"
      mem200gb: "memory = 200000000000.B"
      mem500gb: "memory = 500000000000.B"
      mem1tb: "memory = 1000000000000.B"
      mem2tb: "memory = 2000000000000.B"
      mem5tb: "memory = 5000000000000.B"
      mem10tb: "memory = 10000000000000.B"
      mem20tb: "memory = 20000000000000.B"
      mem50tb: "memory = 50000000000000.B"
      mem100tb: "memory = 100000000000000.B"
      mem200tb: "memory = 200000000000000.B"
      mem500tb: "memory = 500000000000000.B"
      mem1gib: "memory = 1073741824.B"
      mem2gib: "memory = 2147483648.B"
      mem4gib: "memory = 4294967296.B"
      mem8gib: "memory = 8589934592.B"
      mem16gib: "memory = 17179869184.B"
      mem32gib: "memory = 34359738368.B"
      mem64gib: "memory = 68719476736.B"
      mem128gib: "memory = 137438953472.B"
      mem256gib: "memory = 274877906944.B"
      mem512gib: "memory = 549755813888.B"
