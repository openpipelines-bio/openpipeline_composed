  container: "docker"
build_info:
  config: "src/single_cell/parallel_integration/config.vsh.yaml"
  runner: "nextflow"
  engine: "native"
  output: "target/nextflow/single_cell/parallel_integration"
  executable: "target/nextflow/single_cell/parallel_integration/main.nf"
  viash_version: "0.9.7"
  git_commit: "a252528bd8939453ad25711df0bc98ee0479f6ee"
  git_remote: "https://github.com/openpipelines-bio/openpipeline_composed"
  dependencies:
  - "target/dependencies/vsh/vsh/openpipeline/v4.1.0/nextflow/workflows/integration/harmony_leiden"
  - "target/dependencies/vsh/vsh/openpipeline/v4.1.0/nextflow/workflows/integration/scvi_leiden"
  - "target/dependencies/vsh/vsh/openpipeline/v4.1.0/nextflow/workflows/integration/scanorama_leiden"
  - "target/dependencies/vsh/vsh/openpipeline/v4.1.0/nextflow/workflows/integration/bbknn_leiden"
